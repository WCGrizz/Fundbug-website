<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback — FundBug</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=Jost:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1a14; --ink2: #2d2d24; --green: #5a9e52; --green-lt: #7ab870;
      --green-dk: #3d7a38; --cream: #f7f5f0; --cream2: #ede9e0; --cream3: #e2ddd4;
      --muted: #8a8578; --border: #d8d3c8; --white: #ffffff; --red: #c44b2a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--ink);
      color: var(--white);
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }

    /* subtle grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--cream);
      color: var(--ink);
      border-radius: 12px;
      padding: 52px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,.4);
      animation: rise 0.4s cubic-bezier(.22,.9,.36,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--green);
      margin-bottom: 32px;
      letter-spacing: -0.01em;
    }

    .icon {
      font-size: 52px;
      line-height: 1;
      margin-bottom: 20px;
      animation: pop 0.5s cubic-bezier(.34,1.56,.64,1) 0.2s both;
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .sub {
      font-size: 16px;
      font-weight: 300;
      color: var(--ink2);
      line-height: 1.65;
      margin-bottom: 28px;
    }

    .program-name {
      display: inline-block;
      background: var(--cream2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink2);
      margin-bottom: 28px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .divider {
      height: 1px;
      background: var(--cream3);
      margin: 28px 0;
    }

    .community-note {
      font-size: 14px;
      font-weight: 300;
      color: var(--ink2);
      line-height: 1.65;
    }

    .community-note strong {
      color: var(--ink2);
      font-weight: 500;
      font-style: normal;
    }

    .back-link {
      display: inline-block;
      margin-top: 28px;
      font-size: 13px;
      font-weight: 500;
      color: var(--green-dk);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .back-link:hover { border-color: var(--green-dk); }

    /* error state */
    .card.error .icon { filter: grayscale(1); }
  </style>
</head>
<body>
<div class="card" id="card">

  <div class="logo">FundBug</div>

  <div class="icon" id="icon">—</div>
  <h1 id="headline">—</h1>
  <p class="sub" id="subtext">—</p>

  <div id="programWrap" style="display:none">
    <div class="program-name" id="programName"></div>
  </div>

  <div class="divider"></div>

  <p class="community-note" id="communityNote">—</p>

  <a href="https://fundbug.net" class="back-link">← Back to FundBug</a>

</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const signal = params.get('signal');
  const program = params.get('program');
  const error = params.get('error');

  const icon      = document.getElementById('icon');
  const headline  = document.getElementById('headline');
  const subtext   = document.getElementById('subtext');
  const community = document.getElementById('communityNote');
  const progWrap  = document.getElementById('programWrap');
  const progName  = document.getElementById('programName');
  const card      = document.getElementById('card');

  if (program) {
    progName.textContent = decodeURIComponent(program);
    progWrap.style.display = 'block';
  }

  if (error) {
    card.classList.add('error');
    icon.textContent = '🔗';
    headline.textContent = 'That link didn\'t work';
    subtext.textContent = 'This feedback link may have expired or already been used. No worries — just hit reply to your digest email if you have thoughts to share.';
    community.textContent = 'Questions? Reach us at hello@fundbug.net';
  } else if (signal === 'up') {
    icon.textContent = '👍';
    headline.textContent = 'Good to know!';
    subtext.textContent = program
      ? 'We\'ll factor that in when building your next digest.'
      : 'That signal helps us tune your future matches.';
    community.innerHTML = '<strong>Every thumbs-up helps.</strong> The more subscribers share feedback, the smarter FundBug gets at finding programs that are actually relevant — for you and for businesses like yours in your area.';
  } else if (signal === 'down') {
    icon.textContent = '👎';
    headline.textContent = 'Noted — we\'ll do better.';
    subtext.textContent = program
      ? 'We\'ll deprioritize programs like this for your profile going forward.'
      : 'That signal helps us filter out programs that aren\'t a fit for you.';
    community.innerHTML = '<strong>Negative feedback is the most valuable kind.</strong> Knowing what doesn\'t fit is just as useful as knowing what does — it sharpens your matches and helps other businesses in your area too.';
  } else {
    icon.textContent = '✓';
    headline.textContent = 'Thanks for the feedback';
    subtext.textContent = 'Your input helps us improve FundBug for everyone.';
    community.textContent = 'The more subscribers share feedback, the better the recommendations get.';
  }
</script>
</body>
</html>
