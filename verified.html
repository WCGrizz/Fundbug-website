<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Verified — FundBug</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1a14; --ink2: #2d2d24; --green: #5a9e52; --green-lt: #7ab870;
      --green-dk: #3d7a38; --cream: #f7f5f0; --cream2: #ede9e0; --cream3: #e2ddd4;
      --muted: #8a8578; --border: #d8d3c8; --white: #ffffff; --red: #c44b2a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--ink);
      color: var(--white);
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }
    .card {
      position: relative;
      z-index: 1;
      background: var(--cream);
      color: var(--ink);
      border-radius: 12px;
      padding: 52px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,.4);
      animation: rise 0.4s cubic-bezier(.22,.9,.36,1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--green);
      margin-bottom: 32px;
      letter-spacing: -0.01em;
    }
    .icon {
      font-size: 52px;
      line-height: 1;
      margin-bottom: 20px;
      animation: pop 0.5s cubic-bezier(.34,1.56,.64,1) 0.2s both;
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }
    h1 {
      font-family: 'Fraunces', serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.2;
      margin-bottom: 12px;
    }
    .sub {
      font-size: 16px;
      font-weight: 300;
      color: var(--ink2);
      line-height: 1.65;
      margin-bottom: 28px;
    }
    .divider {
      height: 1px;
      background: var(--cream3);
      margin: 28px 0;
    }
    .tip {
      font-size: 14px;
      font-weight: 400;
      color: var(--ink2);
      line-height: 1.6;
    }
    .tip strong {
      color: var(--ink2);
      font-weight: 500;
      font-style: normal;
    }
    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 11px 24px;
      background: var(--green);
      color: var(--white);
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.15s;
    }
    .btn:hover { background: var(--green-dk); }
    .back-link {
      display: inline-block;
      margin-top: 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--green-dk);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .back-link:hover { border-color: var(--green-dk); }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">FundBug</div>
  <div class="icon" id="icon">—</div>
  <h1 id="headline">—</h1>
  <p class="sub" id="subtext">—</p>
  <div id="actions"></div>
  <div class="divider"></div>
  <p class="tip" id="tip">—</p>
</div>

<script>
  const status = new URLSearchParams(window.location.search).get('status');
  const icon     = document.getElementById('icon');
  const headline = document.getElementById('headline');
  const subtext  = document.getElementById('subtext');
  const actions  = document.getElementById('actions');
  const tip      = document.getElementById('tip');

  if (status === 'success') {
    icon.textContent     = '✓';
    icon.style.color     = '#5a9e52';
    headline.textContent = 'Email verified.';
    subtext.textContent  = 'You\'re all set. Your FundBug digest will be in your inbox within 24 hours.';
    actions.innerHTML    = '<a href="https://fundbug.net/portal.html" class="btn">Go to your portal →</a>';
    tip.innerHTML        = '<strong>One more thing:</strong> Add digests@fundbug.net to your contacts so your digest always lands in Primary.';
  } else if (status === 'already') {
    icon.textContent     = '✓';
    icon.style.color     = '#5a9e52';
    headline.textContent = 'Already verified.';
    subtext.textContent  = 'Your email address was already confirmed. Nothing else to do.';
    actions.innerHTML    = '<a href="https://fundbug.net/portal.html" class="btn">Go to your portal →</a>';
    tip.textContent      = 'Your digests are on the way. Check your inbox every two weeks.';
  } else if (status === 'invalid') {
    icon.textContent     = '🔗';
    headline.textContent = 'That link didn\'t work.';
    subtext.textContent  = 'This verification link may have expired or already been used. Log in to your portal to request a new one.';
    actions.innerHTML    = '<a href="https://fundbug.net/portal.html" class="btn">Go to your portal →</a>';
    tip.textContent      = 'Questions? Reach us at hello@fundbug.net.';
  } else if (status === 'error') {
    icon.textContent     = '⚠';
    headline.textContent = 'Something went wrong.';
    subtext.textContent  = 'We weren\'t able to verify your email. Please try again or contact us.';
    actions.innerHTML    = '<a href="mailto:hello@fundbug.net" class="btn">Contact us</a>';
    tip.textContent      = 'hello@fundbug.net — we\'ll get it sorted.';
  } else {
    icon.textContent     = '✓';
    headline.textContent = 'Thanks for verifying.';
    subtext.textContent  = 'Your email address has been confirmed.';
    actions.innerHTML    = '<a href="https://fundbug.net/portal.html" class="btn">Go to your portal →</a>';
    tip.textContent      = 'Your digests are on the way.';
  }
</script>
</body>
</html>
