<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — FundBug</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1a14; --ink2: #2d2d24; --green: #5a9e52; --green-lt: #7ab870;
      --green-dk: #3d7a38; --cream: #f7f5f0; --cream2: #ede9e0; --cream3: #e2ddd4;
      --muted: #8a8578; --border: #d8d3c8; --white: #ffffff; --red: #c44b2a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--ink);
      color: var(--white);
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }
    .card {
      position: relative;
      z-index: 1;
      background: var(--cream);
      color: var(--ink);
      border-radius: 12px;
      padding: 52px 48px;
      max-width: 420px;
      width: 100%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,.4);
      animation: rise 0.4s cubic-bezier(.22,.9,.36,1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .logo {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--green);
      margin-bottom: 8px;
    }
    .card-sub {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink2);
      margin-bottom: 32px;
    }
    .form-group {
      text-align: left;
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink2);
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      color: var(--ink);
      background: var(--white);
      outline: none;
      transition: border-color 0.15s;
    }
    .form-group input:focus { border-color: var(--green); }
    .btn {
      width: 100%;
      padding: 12px;
      background: var(--green);
      color: var(--white);
      border: none;
      border-radius: 6px;
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .btn:hover { background: var(--green-dk); }
    .btn:disabled { background: var(--muted); cursor: not-allowed; }
    .err {
      font-size: 12px;
      color: var(--red);
      min-height: 16px;
      margin-bottom: 12px;
      text-align: left;
    }
    .success-icon {
      font-size: 52px;
      line-height: 1;
      margin-bottom: 20px;
      animation: pop 0.5s cubic-bezier(.34,1.56,.64,1) 0.2s both;
    }
    @keyframes pop {
      from { opacity: 0; transform: scale(0.5); }
      to   { opacity: 1; transform: scale(1); }
    }
    h1 {
      font-family: 'Fraunces', serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 12px;
    }
    .sub {
      font-size: 14px;
      font-weight: 300;
      color: var(--ink2);
      line-height: 1.65;
      margin-bottom: 24px;
    }
    .divider { height: 1px; background: var(--cream3); margin: 24px 0; }
    .back-link {
      display: inline-block;
      margin-top: 16px;
      font-size: 12px;
      font-weight: 500;
      color: var(--green-dk);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .back-link:hover { border-color: var(--green-dk); }
    .portal-btn {
      display: inline-block;
      margin-top: 4px;
      padding: 11px 24px;
      background: var(--green);
      color: var(--white);
      font-family: 'Jost', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.15s;
    }
    .portal-btn:hover { background: var(--green-dk); }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">FundBug</div>
  <div class="card-sub" id="cardSub">Reset your password</div>

  <!-- FORM STATE -->
  <div id="formState">
    <div class="err" id="errMsg"></div>
    <div class="form-group">
      <label>New password</label>
      <input type="password" id="pw1" placeholder="Minimum 8 characters" onkeydown="if(event.key==='Enter')doReset()">
    </div>
    <div class="form-group">
      <label>Confirm password</label>
      <input type="password" id="pw2" placeholder="Repeat password" onkeydown="if(event.key==='Enter')doReset()">
    </div>
    <button class="btn" id="submitBtn" onclick="doReset()">Set new password</button>
    <div><a href="portal.html" class="back-link">← Back to sign in</a></div>
  </div>

  <!-- SUCCESS STATE -->
  <div id="successState" style="display:none">
    <div class="success-icon">✓</div>
    <h1>Password updated.</h1>
    <p class="sub">Your new password is set. You can now sign in to your portal.</p>
    <a href="portal.html" class="portal-btn">Sign in →</a>
  </div>

  <!-- ERROR STATE (bad/expired token) -->
  <div id="errorState" style="display:none">
    <div class="success-icon" style="filter:grayscale(1)">🔗</div>
    <h1>Link expired.</h1>
    <p class="sub">This reset link has expired or already been used. Request a new one from the sign in page.</p>
    <div class="divider"></div>
    <a href="portal.html" class="back-link">← Back to sign in</a>
  </div>
</div>

<script>
const API = 'https://fundbug-production.up.railway.app';
const token = new URLSearchParams(window.location.search).get('token');

// No token in URL — show error immediately
if (!token) {
  document.getElementById('formState').style.display = 'none';
  document.getElementById('errorState').style.display = 'block';
  document.getElementById('cardSub').textContent = 'Invalid link';
}

async function doReset() {
  const pw1 = document.getElementById('pw1').value;
  const pw2 = document.getElementById('pw2').value;
  const err = document.getElementById('errMsg');
  const btn = document.getElementById('submitBtn');

  err.textContent = '';

  if (!pw1 || pw1.length < 8) {
    err.textContent = 'Password must be at least 8 characters.';
    return;
  }
  if (pw1 !== pw2) {
    err.textContent = 'Passwords do not match.';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Updating…';

  try {
    const r = await fetch(API + '/api/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, new_password: pw1 })
    });
    const data = await r.json();

    if (!r.ok) {
      // Expired or invalid token
      document.getElementById('formState').style.display = 'none';
      document.getElementById('errorState').style.display = 'block';
      document.getElementById('cardSub').textContent = 'Link expired';
      return;
    }

    // Success
    document.getElementById('formState').style.display = 'none';
    document.getElementById('successState').style.display = 'block';
    document.getElementById('cardSub').textContent = 'All done';

  } catch(e) {
    err.textContent = 'Something went wrong. Please try again.';
    btn.disabled = false;
    btn.textContent = 'Set new password';
  }
}
</script>
</body>
</html>
